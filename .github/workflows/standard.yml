name: standard
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # descriptor pins claims to their last-touching commit — needs history
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: typecheck
        run: bun run typecheck
      - name: test
        run: bun test
      - name: descriptor drift-gate (dogfood)
        run: bun run self:check
